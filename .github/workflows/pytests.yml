name: pytests
on:
  push:
    branches:
      - "*"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - name: Install system dependencies
        run: >
          sudo apt-get update;
          sudo apt-get install -y python3-dev python3-pip libjpeg-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip;
          pip install pytest pygame
      - name: Setup XVFB
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 3  # wait for XVFB to initialize
      - name: Run tests
        run: pytest test/car_test.py
        env:
          DISPLAY: :99.0
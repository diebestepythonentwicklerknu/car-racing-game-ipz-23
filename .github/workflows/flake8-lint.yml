name: Flake8-Lint

on:
  push:
    branches:
      - '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Flake8
        run: pip install flake8 flake8-html

      - name: Run Flake8
        run: flake8 project/

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report
